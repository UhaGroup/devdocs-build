name: Build and Package DevDocs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.8'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Clean vendor bundle
        run: rm -rf vendor/bundle

      - name: Install project dependencies
        run: |
          gem install bundler -v 2.4.6
          bundle _2.4.6_ config set path 'vendor/bundle'
          bundle _2.4.6_ install

      - name: Download docs
        id: download
        run: |
          bundle _2.4.6_ exec thor docs:download php laravel@11 javascript typescript css sass html dom react@18 vue@3 angular@20 nextjs node@22 LTS npm webpack@5 vite@7 bootstrap@5 tailwindcss@3 jquery_core mysql postgresql@17 sqlite redis apache nginx git bash docker electron react_native express@4 fastapi flask@3.0 mongodb mongoose socketio@4 graphql lodash@4 axios moment eslint prettier babel@7 svelte@4 lit@3 cypress playwright wordpress 2>&1 | tee download.log
        continue-on-error: true

      - name: Copy built files to output folder
        if: always()
        run: |
          rm -rf .git vendor/bundle download.log
          mkdir -p ../devdocs-output
          cp -r . ../devdocs-output/

      - name: Commit and push output folder
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ../devdocs-output
          publish_branch: built
          force_orphan: true
          user_name: 'UhaGroup'
          user_email: 'uha.company@gmail.com'
          commit_message: 'Build DevDocs with docs'
