name: Build Docker Image with Tests and Logs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cat > Dockerfile << 'DOCKEREOF'
          FROM ruby:3.4.8-slim
          RUN apt-get update && apt-get install -y libcurl4-openssl-dev nodejs && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY . /app
          RUN gem install bundler -v 2.4.6 && bundle _2.4.6_ install
          EXPOSE 9292
          CMD ["bundle", "exec", "rackup", "-o", "0.0.0.0"]
          DOCKEREOF
          docker build -t devdocs:latest . 2>&1 | tee build.log

      - name: Test run container
        run: |
          docker run -d -p 9292:9292 --name devdocs-test devdocs:latest
          sleep 5
          docker logs devdocs-test 2>&1 | tee container-test.log || true

      - name: Stop test container
        run: docker stop devdocs-test && docker rm devdocs-test

      - name: Build final image and package
        run: |
          docker save devdocs:latest | gzip | split -b 90m - devdocs-docker.tar.gz.part

      - name: Deploy to built branch
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: built
          force_orphan: true
          user_name: 'UhaGroup'
          user_email: 'uha.company@gmail.com'
          commit_message: 'Build Docker image with tests'
