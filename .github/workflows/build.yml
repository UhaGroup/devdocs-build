name: Build and Package DevDocs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.8'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Clean vendor bundle
        run: rm -rf vendor/bundle

      - name: Install project dependencies
        run: |
          gem install bundler -v 2.4.6
          bundle _2.4.6_ config set path 'vendor/bundle'
          bundle _2.4.6_ install

      - name: Download docs
        run: |
          bundle _2.4.6_ exec thor docs:download php laravel javascript css sass typescript kotlin react webpack mysql sqlite || echo "Some docs failed, continuing..."

      - name: Upload entire app
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devdocs-complete
          path: .
          include-hidden-files: false

