name: Build and Package DevDocs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Fix Gemfile Ruby version
        run: sed -i 's/ruby "3.4.8"/ruby "3.4.7"/' Gemfile

      - name: Install project dependencies
        run: |
          gem install bundler -v 2.4.6
          bundle _2.4.6_ config set path 'vendor/bundle'
          bundle _2.4.6_ install

      - name: Download all documentation
        run: bundle _2.4.6_ exec thor docs:download --all

      - name: Compile assets
        run: bundle _2.4.6_ exec thor assets:compile

      - name: Package application
        run: |
          rm -rf vendor/bundle .git
          tar -czf devdocs-offline.tar.gz .

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: devdocs-complete
          path: devdocs-offline.tar.gz
