  name: Build and Package DevDocs

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Ruby
          uses: ruby/setup-ruby@v1
          with:
            ruby-version: '3.4.8'

        - name: Install system dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y libcurl4-openssl-dev

        - name: Install project dependencies
          run: |
            gem install bundler -v 2.4.6
            bundle _2.4.6_ config set path 'vendor/bundle'
            bundle _2.4.6_ install

        - name: Download php
          run: bundle _2.4.6_ exec thor docs:download php || echo "FAILED"
        - name: Download laravel@11
          run: bundle _2.4.6_ exec thor docs:download laravel@11 || echo "FAILED"
        - name: Download javascript
          run: bundle _2.4.6_ exec thor docs:download javascript || echo "FAILED"
        - name: Download typescript
          run: bundle _2.4.6_ exec thor docs:download typescript || echo "FAILED"
        - name: Download css
          run: bundle _2.4.6_ exec thor docs:download css || echo "FAILED"
        - name: Download sass
          run: bundle _2.4.6_ exec thor docs:download sass || echo "FAILED"
        - name: Download html
          run: bundle _2.4.6_ exec thor docs:download html || echo "FAILED"
        - name: Download dom
          run: bundle _2.4.6_ exec thor docs:download dom || echo "FAILED"
        - name: Download react@18
          run: bundle _2.4.6_ exec thor docs:download react@18 || echo "FAILED"
        - name: Download vue@3
          run: bundle _2.4.6_ exec thor docs:download vue@3 || echo "FAILED"
        - name: Download angular@20
          run: bundle _2.4.6_ exec thor docs:download angular@20 || echo "FAILED"
        - name: Download nextjs
          run: bundle _2.4.6_ exec thor docs:download nextjs || echo "FAILED"
        - name: Download npm
          run: bundle _2.4.6_ exec thor docs:download npm || echo "FAILED"
        - name: Download webpack@5
          run: bundle _2.4.6_ exec thor docs:download webpack@5 || echo "FAILED"
        - name: Download vite@7
          run: bundle _2.4.6_ exec thor docs:download vite@7 || echo "FAILED"
        - name: Download bootstrap@5
          run: bundle _2.4.6_ exec thor docs:download bootstrap@5 || echo "FAILED"
        - name: Download tailwindcss@3
          run: bundle _2.4.6_ exec thor docs:download tailwindcss@3 || echo "FAILED"
        - name: Download jquery_core
          run: bundle _2.4.6_ exec thor docs:download jquery_core || echo "FAILED"
        - name: Download mariadb
          run: bundle _2.4.6_ exec thor docs:download mariadb || echo "FAILED"
        - name: Download postgresql@17
          run: bundle _2.4.6_ exec thor docs:download postgresql@17 || echo "FAILED"
        - name: Download sqlite
          run: bundle _2.4.6_ exec thor docs:download sqlite || echo "FAILED"
        - name: Download redis
          run: bundle _2.4.6_ exec thor docs:download redis || echo "FAILED"
        - name: Download apache
          run: bundle _2.4.6_ exec thor docs:download apache || echo "FAILED"
        - name: Download nginx
          run: bundle _2.4.6_ exec thor docs:download nginx || echo "FAILED"
        - name: Download git
          run: bundle _2.4.6_ exec thor docs:download git || echo "FAILED"
        - name: Download bash
          run: bundle _2.4.6_ exec thor docs:download bash || echo "FAILED"
        - name: Download docker
          run: bundle _2.4.6_ exec thor docs:download docker || echo "FAILED"
        - name: Download electron
          run: bundle _2.4.6_ exec thor docs:download electron || echo "FAILED"
        - name: Download react_native
          run: bundle _2.4.6_ exec thor docs:download react_native || echo "FAILED"
        - name: Download express@4
          run: bundle _2.4.6_ exec thor docs:download express@4 || echo "FAILED"
        - name: Download fastapi
          run: bundle _2.4.6_ exec thor docs:download fastapi || echo "FAILED"
        - name: Download flask@3.0
