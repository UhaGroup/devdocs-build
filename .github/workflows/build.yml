        - name: Download mongoose
          run: bundle _2.4.6_ exec thor docs:download mongoose || echo "FAILED"
        - name: Download socketio@4
          run: bundle _2.4.6_ exec thor docs:download socketio@4 || echo "FAILED"
        - name: Download graphql
          run: bundle _2.4.6_ exec thor docs:download graphql || echo "FAILED"
        - name: Download lodash@4
          run: bundle _2.4.6_ exec thor docs:download lodash@4 || echo "FAILED"
        - name: Download axios
          run: bundle _2.4.6_ exec thor docs:download axios || echo "FAILED"
        - name: Download moment
          run: bundle _2.4.6_ exec thor docs:download moment || echo "FAILED"
        - name: Download eslint
          run: bundle _2.4.6_ exec thor docs:download eslint || echo "FAILED"
        - name: Download prettier
          run: bundle _2.4.6_ exec thor docs:download prettier || echo "FAILED"
        - name: Download babel@7
          run: bundle _2.4.6_ exec thor docs:download babel@7 || echo "FAILED"
        - name: Download svelte@4
          run: bundle _2.4.6_ exec thor docs:download svelte@4 || echo "FAILED"
        - name: Download lit@3
          run: bundle _2.4.6_ exec thor docs:download lit@3 || echo "FAILED"
        - name: Download cypress
          run: bundle _2.4.6_ exec thor docs:download cypress || echo "FAILED"
        - name: Download playwright
          run: bundle _2.4.6_ exec thor docs:download playwright || echo "FAILED"
        - name: Download wordpress
          run: bundle _2.4.6_ exec thor docs:download wordpress || echo "FAILED"

        - name: Compile assets
          run: bundle _2.4.6_ exec thor assets:compile || echo "Compile failed, continuing..."

        - name: Deploy to built branch
          if: always()
          uses: peaceiris/actions-gh-pages@v3
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./
            publish_branch: built
            force_orphan: true
            user_name: 'UhaGroup'
            user_email: 'uha.company@gmail.com'
            commit_message: 'Build DevDocs with all docs'
